name: CI
on:
  push:
  pull_request:
jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with: { go-version: '1.26.x', cache-dependency-path: backend/go.sum }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: gofmt -l . | tee /tmp/gofmt && test ! -s /tmp/gofmt
        working-directory: backend
      - run: go vet ./... && go test ./...
        working-directory: backend
      - run: npm ci
        working-directory: frontend
      - run: npm run check && npm run lint && npm test -- --run && npm run build
        working-directory: frontend
      - run: npm audit --audit-level=high
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: npm run test:e2e
        working-directory: frontend
      - run: docker build .
