name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: "1.26.5"
          cache-dependency-path: backend/go.sum

      - name: Verify Go formatting
        working-directory: backend
        run: test -z "$(gofmt -l .)"

      - name: Test and vet backend
        working-directory: backend
        run: go vet ./... && go test ./...

      - name: Scan Go dependencies
        working-directory: backend
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

      - name: Set up Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Test release metadata tooling
        run: node --test scripts/*.test.mjs

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Verify frontend
        working-directory: frontend
        run: npm run check && npm run lint && npm test -- --run && npm run build

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run browser tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Build Docker image
        run: docker build --build-arg VERSION=ci --build-arg COMMIT=${{ github.sha }} -t koalaparty:ci .

      - name: Smoke-test Docker image
        run: |
          set -euo pipefail
          docker run -d --name koalaparty-ci -p 127.0.0.1:8080:8080 koalaparty:ci
          trap 'docker logs koalaparty-ci; docker rm -f koalaparty-ci' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:8080/api/ready; then
              curl --fail --silent http://127.0.0.1:8080/api/version
              exit 0
            fi
            sleep 1
          done
          exit 1
