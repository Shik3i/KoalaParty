services:
  koalaparty:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - koalaparty-data:/data
    healthcheck:
      test: ["CMD", "/koalaparty", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  koalaparty-data:

