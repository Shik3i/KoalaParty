services:
  koalaparty:
    image: ghcr.io/shik3i/koalaparty:${KOALAPARTY_VERSION:-latest}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      KOALAPARTY_ADDR: :8080
      KOALAPARTY_DB: /data/koalaparty.db
      KOALAPARTY_WEB_ROOT: /app/web
      KOALAPARTY_TRUSTED_ORIGINS: ${KOALAPARTY_TRUSTED_ORIGINS:-http://localhost:8080}
      KOALAPARTY_COOKIE_SECURE: ${KOALAPARTY_COOKIE_SECURE:-false}
      KOALAPARTY_SESSION_TTL: ${KOALAPARTY_SESSION_TTL:-168h}
      KOALAPARTY_ACTIVITY_MAX_AGE: ${KOALAPARTY_ACTIVITY_MAX_AGE:-720h}
      KOALAPARTY_ACTIVITY_MAX_EVENTS: ${KOALAPARTY_ACTIVITY_MAX_EVENTS:-200}
      KOALAPARTY_ROOM_MAX_IDLE: ${KOALAPARTY_ROOM_MAX_IDLE:-8760h}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - koalaparty-data:/data
    healthcheck:
      test: ["CMD", "/koalaparty", "healthcheck"]
      interval: 15s
      timeout: 3s
      retries: 5

volumes:
  koalaparty-data:
